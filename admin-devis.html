<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin-factures.css" />
  <title>Administration MULTIPIXELS | Devis</title>
</head>
<body data-admin-section="quotes">
  <main class="page-shell admin-shell">
    <section class="section client-dashboard-section">
      <div class="container client-dashboard-shell">
        <div class="client-dashboard-hero reveal admin-hero-compact">
          <div>
            <span class="section-label">Administration</span>
            <h1 id="admin-welcome">Administration MULTIPIXELS</h1>
            
          </div>
          <div class="client-dashboard-actions">
            <a class="btn btn-outline" href="/index.html">Retour au site</a>
            <button class="btn" id="admin-logout" type="button">Se deconnecter</button>
          </div>
        </div>

        <nav class="admin-page-nav reveal" aria-label="Navigation administrateur">
          <a href="admin-dashboard.html" data-admin-nav="overview">Vue d'ensemble</a>
          <a href="admin-clients.html" data-admin-nav="clients">Clients</a>
          <a href="admin-commandes.html" data-admin-nav="commandes">Commandes</a>
          <a href="admin-devis.html" class="is-active" data-admin-nav="quotes" aria-current="page">Devis</a>
          <a href="admin-factures.html" data-admin-nav="invoices">Factures</a>
          <a href="admin-facture-clients.html" data-admin-nav="invoice-clients">Clients facture</a>
          <a href="admin-facture-references.html" data-admin-nav="invoice-references">References facture</a>
          <a href="admin-sav.html" data-admin-nav="sav">SAV</a>
          <a href="admin-articles.html" data-admin-nav="articles">Articles en ligne</a>
          <a href="admin-catalogue.html" data-admin-nav="catalogue">Catalogue</a>
        </nav>

        <section class="admin-invoice-builder reveal">
          <aside class="admin-invoice-sidebar">
            <div class="admin-invoice-card">
              <div class="admin-invoice-card-head">
                <span class="section-label">Devis</span>
                
                
              </div>

              <p id="admin-status" class="client-auth-status"></p>

              <form id="admin-quote-live-form" class="admin-invoice-form" novalidate>
                <input type="hidden" id="quote-id" />

                <section class="admin-invoice-group admin-invoice-accordion is-open" data-accordion="quote-info">
                  <button class="admin-invoice-group-toggle" type="button" aria-expanded="true" aria-controls="accordion-quote-info">
                    <span class="admin-invoice-group-title">Infos devis</span>
                    <span class="admin-invoice-group-icon" aria-hidden="true"></span>
                  </button>
                  <div class="admin-invoice-group-body" id="accordion-quote-info">
                    <div class="admin-invoice-grid admin-invoice-grid-2">
                      <label>
                        <span>Type</span>
                        <select id="quote-type"><option value="Devis">Devis</option></select>
                      </label>
                      <label>
                        <span>Numero</span>
                        <input id="quote-reference" type="text" readonly />
                      </label>
                    </div>
                    <div class="admin-invoice-grid admin-invoice-grid-2">
                      <label>
                        <span>Date</span>
                        <input id="quote-issue-date" type="date" />
                      </label>
                      <label>
                        <span>TVA (%)</span>
                        <input id="quote-vat-rate" type="number" min="0" step="0.01" value="0" />
                      </label>
                    </div>
                    <div class="admin-invoice-grid admin-invoice-grid-2">
                      <label>
                        <span>Validite (jours)</span>
                        <input id="quote-payment-days" type="number" min="0" step="1" value="15" />
                      </label>
                      <label class="admin-invoice-checkbox-row">
                        <span>Statut</span>
                        <span class="admin-invoice-checkbox">
                          <input id="quote-approved" type="checkbox" />
                          <span>Marquer comme accepte</span>
                        </span>
                      </label>
                    </div>
                    <label>
                      <span>Mention TVA si taux = 0</span>
                      <input id="quote-vat-mention" type="text" value="TVA non applicable, art. 293B du CGI" />
                    </label>
                  </div>
                </section>

                <section class="admin-invoice-group admin-invoice-accordion" data-accordion="quote-client">
                  <button class="admin-invoice-group-toggle" type="button" aria-expanded="false" aria-controls="accordion-quote-client">
                    <span class="admin-invoice-group-title">Infos client</span>
                    <span class="admin-invoice-group-icon" aria-hidden="true"></span>
                  </button>
                  <div class="admin-invoice-group-body" id="accordion-quote-client">
                    <label class="admin-invoice-select-row"><span>Selectionner un client enregistre</span><select id="quote-client-select"><option value="">Saisie manuelle</option></select></label>
                    <div class="admin-invoice-grid admin-invoice-grid-2">
                      <label><span>Nom / societe</span><input id="quote-customer-name" type="text" placeholder="Nom du client" /></label>
                      <label><span>Email client</span><input id="quote-customer-email" type="email" placeholder="client@email.fr" /></label>
                    </div>
                    <div class="admin-invoice-grid admin-invoice-grid-2">
                      <label><span>Telephone</span><input id="quote-customer-phone" type="text" placeholder="06 00 00 00 00" /></label>
                      <label><span>Complement</span><input id="quote-customer-company" type="text" placeholder="Societe, service, reference..." /></label>
                    </div>
                    <label><span>Adresse</span><input id="quote-address-line1" type="text" placeholder="1 rue exemple" /></label>
                    <label><span>Complement adresse</span><input id="quote-address-line2" type="text" placeholder="Batiment, etage, atelier..." /></label>
                    <div class="admin-invoice-grid admin-invoice-grid-3">
                      <label><span>Code postal</span><input id="quote-postal-code" type="text" placeholder="62180" /></label>
                      <label><span>Ville</span><input id="quote-city" type="text" placeholder="Rang-du-Fliers" /></label>
                      <label><span>Pays</span><input id="quote-country" type="text" value="France" /></label>
                    </div>
                  </div>
                </section>

                <section class="admin-invoice-group admin-invoice-accordion" data-accordion="quote-lines">
                  <button class="admin-invoice-group-toggle" type="button" aria-expanded="false" aria-controls="accordion-quote-lines">
                    <span class="admin-invoice-group-title">Lignes devis</span>
                    <span class="admin-invoice-group-icon" aria-hidden="true"></span>
                  </button>
                  <div class="admin-invoice-group-body" id="accordion-quote-lines">
                    <div class="admin-invoice-group-head admin-invoice-reference-tools">
                      <label class="admin-invoice-select-row"><span>Selectionner une reference enregistree</span><select id="quote-reference-select"><option value="">Choisir une reference</option></select></label>
                      <button class="btn btn-outline btn-sm" id="quote-add-line" type="button">Ajouter une ligne vide</button>
                    </div>
                    <div id="quote-lines" class="admin-invoice-lines"></div>
                  </div>
                </section>

                <div class="admin-invoice-actions">
                  <button class="btn btn-outline" id="quote-new" type="button">Nouveau devis</button>
                  <button class="btn btn-outline" id="quote-download" type="button">Telecharger le PDF</button>
                </div>
              </form>
            </div>
          </aside>

          <div class="admin-invoice-preview-area">
            <div class="admin-invoice-preview-toolbar">
              <div>
                <span class="section-label">Previsualisation</span>
                
              </div>
              <p id="quote-preview-meta" class="admin-invoice-preview-meta"></p>
            </div>
            <div class="admin-invoice-sheet-wrap">
              <article id="quote-preview-sheet" class="admin-invoice-sheet"></article>
            </div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="admin-auth.js"></script>
  <script src="admin-devis.js"></script>
</body>
</html>
