<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <title>Administration MULTIPIXELS | Références facture</title>
</head>
<body data-admin-section="invoice-references">
  <main class="page-shell admin-shell">
    <section class="section client-dashboard-section">
      <div class="container client-dashboard-shell">
        <div class="client-dashboard-hero reveal admin-hero-compact">
          <div>
            <span class="section-label">Administration</span>
            <h1 id="admin-welcome">Administration MULTIPIXELS</h1>
            
          </div>
          <div class="client-dashboard-actions">
            <a class="btn btn-outline" href="/index.html">Retour au site</a>
            <button class="btn" id="admin-logout" type="button">Se déconnecter</button>
          </div>
        </div>

        <nav class="admin-page-nav reveal" aria-label="Navigation administrateur">
          <a href="admin-dashboard.html" data-admin-nav="overview">Vue d’ensemble</a>
          <a href="admin-clients.html" data-admin-nav="clients">Clients</a>
          <a href="admin-commandes.html" data-admin-nav="commandes">Commandes</a>
          <a href="admin-devis.html" data-admin-nav="quotes">Devis</a>
          <a href="admin-factures.html" data-admin-nav="invoices">Factures</a>
          <a href="admin-facture-clients.html" data-admin-nav="invoice-clients">Clients facture</a>
          <a href="admin-facture-references.html" class="is-active" data-admin-nav="invoice-references" aria-current="page">Références facture</a>
          <a href="admin-sav.html" data-admin-nav="sav">SAV</a>
          <a href="admin-articles.html" data-admin-nav="articles">Articles en ligne</a>
          <a href="admin-catalogue.html" data-admin-nav="catalogue">Catalogue</a>
        </nav>

                <section class="client-panel-card reveal admin-invoice-data-panel">
          <div class="client-panel-top">
            <div>
              <span class="section-label">Références</span>
              <h2>Gestionnaire de références facture</h2>
              
            </div>
          </div>
          <p id="admin-status" class="client-auth-status"></p>
          <form id="invoice-reference-form" class="admin-invoice-data-form" novalidate>
            <input type="hidden" name="id" />
            <div class="admin-invoice-data-grid admin-invoice-data-grid-reference">
              <label><span>Référence</span><input name="reference" type="text" required placeholder="SPE1" /></label>
              <label><span>Désignation</span><input name="designation" type="text" required placeholder="Empiècement dos avec velcro" /></label>
              <label><span>Tarif</span><input name="price" type="number" min="0" step="0.01" required placeholder="14.00" /></label>
            </div>
            <div class="admin-invoice-data-actions">
              <button class="btn" type="submit">Ajouter la référence</button>
              <button class="btn btn-outline" id="invoice-reference-reset" type="button">Réinitialiser</button>
            </div>
          </form>
        </section>

        <section class="client-panel-card reveal admin-invoice-data-panel">
          <div class="client-panel-top">
            <div>
              <span class="section-label">Liste</span>
              <h2>Références enregistrées</h2>
            </div>
            <span id="invoice-reference-count" class="client-status-chip is-in-progress">0 référence</span>
          </div>
          <div id="invoice-reference-list" class="admin-invoice-data-list"></div>
        </section>
      </div>
    </section>
  </main>

  <script src="admin-auth.js"></script>
  <script src="admin-invoice-data.js"></script>
</body>
</html>
