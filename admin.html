<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administration MULTIPIXELS | Connexion</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="admin-login-page">
  <main class="page-shell admin-shell admin-login-screen">
    <section class="section admin-login-section">
      <div class="container admin-login-wrap">
        <article class="admin-login-panel">
          <div class="admin-login-brand">
            <div class="admin-login-emblem" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M7 18a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-7h1.2a1 1 0 0 0 .77-1.64l-6-7.2a1.27 1.27 0 0 0-1.94 0l-6 7.2A1 1 0 0 0 5.8 11H7Zm3.2-2.5a.8.8 0 0 1 .8-.8h2a.8.8 0 0 1 .8.8v2.7h-3.6Z"></path></svg>
            </div>
            <h1>MULTIPIXELS</h1>
            <p>ADMIN PORTAL</p>
          </div>

          <div class="admin-login-divider"></div>

          <form id="admin-login-form" class="admin-login-form" novalidate>
            <label class="admin-login-field">
              <span class="admin-login-sr">Identifiant</span>
              <span class="admin-login-field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M12 12.2a4.1 4.1 0 1 0-4.1-4.1 4.1 4.1 0 0 0 4.1 4.1Zm0 2.2c-4.05 0-7.3 2.08-7.3 4.65 0 .36.29.65.65.65h13.3c.36 0 .65-.29.65-.65 0-2.57-3.25-4.65-7.3-4.65Z"></path></svg>
              </span>
              <input type="email" name="email" placeholder="Identifiant" autocomplete="username" required />
            </label>

            <label class="admin-login-field admin-login-field--muted">
              <span class="admin-login-sr">Mot de passe</span>
              <span class="admin-login-field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M17 10h-1V8a4 4 0 1 0-8 0v2H7a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2Zm-6-2a2 2 0 1 1 4 0v2h-4Zm1 8.8a1.8 1.8 0 1 1 1.8-1.8 1.8 1.8 0 0 1-1.8 1.8Z"></path></svg>
              </span>
              <input type="password" name="password" placeholder="Mot de passe" autocomplete="current-password" required />
            </label>

            <button class="btn admin-login-submit" type="submit">Se connecter</button>
            <p id="admin-login-status" class="client-auth-status admin-login-status"></p>
          </form>

          <div class="admin-login-footer">
            <span>© 2026 MULTIPIXELS. Accès sécurisé.</span>
          </div>
        </article>
      </div>
    </section>
  </main>
  <script src="admin-auth.js"></script>
  <script src="admin-login.js"></script>
</body>
</html>
